<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Orange rounded background -->
  <rect width="32" height="32" rx="8" fill="#FC8019"/>

  <!-- Fork: 3 tines + curved neck + handle -->
  <line x1="9"  y1="7.5" x2="9"  y2="12" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="11.5" y1="7.5" x2="11.5" y2="12" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="14" y1="7.5" x2="14" y2="12" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M9 12 Q9 14 11.5 14.5 Q14 14 14 12" stroke="white" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <line x1="11.5" y1="14.5" x2="11.5" y2="24.5" stroke="white" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Knife: curved blade + straight handle -->
  <path d="M19.5 7.5 L21.5 7.5 C23 9 23 12.5 21 13.5 L19.5 14 L19.5 24.5"
        stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
